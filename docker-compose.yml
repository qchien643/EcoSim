version: "3.8"

# ============================================================
# EcoSim Microservice Architecture
# ============================================================
# Start: docker-compose up -d
# Stop:  docker-compose down
# ============================================================

services:
  # ── FalkorDB — Graph Database ──
  falkordb:
    image: falkordb/falkordb
    container_name: ecosim-falkordb
    ports:
      - "6379:6379"
    volumes:
      - falkordb_data:/data
    restart: unless-stopped

  # ── API Gateway — Caddy Reverse Proxy (Port 5000) ──
  gateway:
    image: caddy:2-alpine
    container_name: ecosim-gateway
    ports:
      - "5000:5000"
    volumes:
      - ./apps/gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # Upstream hostnames trong docker network — override nếu deploy khác
      - CORE_UPSTREAM=core:5001
      - SIM_UPSTREAM=simulation:5002
    depends_on:
      - core
      - simulation
    restart: unless-stopped

  # ── Core Service — Campaign + Report (Port 5001) ──
  core:
    build: ./apps/core
    container_name: ecosim-core
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      # ecosim-common library được bind-mount vào container và thêm vào PYTHONPATH
      - PYTHONPATH=/app/libs/ecosim-common/src
    volumes:
      - ./libs/ecosim-common:/app/libs/ecosim-common:ro
      - ./uploads:/app/uploads
      - ./data:/app/data

  # ── Simulation Service — FastAPI (Port 5002) ──
  simulation:
    build:
      context: .
      dockerfile: apps/simulation/Dockerfile
    container_name: ecosim-simulation
    ports:
      - "5002:5002"
    env_file: .env
    environment:
      # Dockerfile bakes vendored/oasis; libs/ecosim-common is mounted fresh
      - PYTHONPATH=/app/libs/ecosim-common/src:/app/vendored/oasis
    volumes:
      - ./libs/ecosim-common:/app/libs/ecosim-common:ro
      - ./data:/app/data
    depends_on:
      - falkordb

  # ── Frontend Service — Web UI (Port 80 mapped to 3000) ──
  frontend:
    build: ./apps/frontend
    container_name: ecosim-frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway

volumes:
  falkordb_data:
  caddy_data:
  caddy_config:
