version: "3.8"

# ============================================================
# EcoSim Microservice Architecture
# ============================================================
# Start: docker-compose up -d
# Stop:  docker-compose down
# ============================================================

services:
  # ── FalkorDB — Graph Database ──
  falkordb:
    image: falkordb/falkordb
    container_name: ecosim-falkordb
    ports:
      - "6379:6379"
    volumes:
      # ⚠ Image FalkorDB ghi dump.rdb vào /var/lib/falkordb/data (đường dẫn
      # thực; /data/data là symlink trỏ tới đó). Mount vào /data sẽ che symlink
      # → data nằm ở writable layer của container và mất khi container
      # recreate. Mount đúng path này để RDB persist trong named volume.
      - falkordb_data:/var/lib/falkordb/data
    restart: unless-stopped

  # ── API Gateway — Caddy Reverse Proxy (Port 5000) ──
  gateway:
    image: caddy:2-alpine
    container_name: ecosim-gateway
    ports:
      - "5000:5000"
    volumes:
      - ./apps/gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # Upstream hostnames trong docker network — override nếu deploy khác
      - CORE_UPSTREAM=core:5001
      - SIM_UPSTREAM=simulation:5002
    depends_on:
      - core
      - simulation
    restart: unless-stopped

  # ── Core Service — Campaign + Report (Port 5001) ──
  core:
    build: ./apps/core
    container_name: ecosim-core
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      # ecosim-common library được bind-mount vào container và thêm vào PYTHONPATH
      - PYTHONPATH=/app/libs/ecosim-common/src
    volumes:
      - ./libs/ecosim-common:/app/libs/ecosim-common:ro
      # Phase 5: uploads/ moved into data/campaigns/. Single ./data mount đủ.
      - ./data:/app/data

  # ── Simulation Service — FastAPI (Port 5002) ──
  simulation:
    build:
      context: .
      dockerfile: apps/simulation/Dockerfile
    container_name: ecosim-simulation
    ports:
      - "5002:5002"
    env_file: .env
    environment:
      # Dockerfile bakes vendored/oasis; libs/ecosim-common is mounted fresh
      - PYTHONPATH=/app/libs/ecosim-common/src:/app/vendored/oasis
    volumes:
      - ./libs/ecosim-common:/app/libs/ecosim-common:ro
      - ./data:/app/data
    depends_on:
      - falkordb

  # ── Frontend Service — Next.js 16 (App Router) on :5173 ──
  # Standalone Node server built from apps/frontend/Dockerfile.
  # Browser-side `/api/*` requests are rewritten server-side to the
  # gateway container (`http://gateway:5000`) — same-origin from the user's POV.
  frontend:
    build: ./apps/frontend
    container_name: ecosim-frontend
    ports:
      - "5173:5173"
    environment:
      - GATEWAY_UPSTREAM=http://gateway:5000
      - NODE_ENV=production
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  falkordb_data:
  caddy_data:
  caddy_config:
