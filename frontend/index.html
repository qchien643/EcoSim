<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoSim — Economic Campaign Simulation</title>
    <meta name="description" content="EcoSim: Platform for economic campaign simulation with AI-driven agent modeling and knowledge graph analysis." />
    <!-- Tailwind CDN (matching Stitch) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Fonts (Memphis Neo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Tailwind Config (Matching Memphis) -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "primary": "#FFE066",
              "secondary": "#FFB7B2",
            },
            fontFamily: {
              "headline": ["Space Grotesk", "sans-serif"],
              "body": ["DM Sans", "sans-serif"],
              "mono": ["Space Mono", "monospace"],
            },
            borderRadius: {
              "DEFAULT": "0px",
              "lg": "0px",
              "xl": "0px",
              "full": "0px",
            },
            keyframes: {
              wobble: {
                "0%, 100%": { transform: "rotate(-15deg)" },
                "50%": { transform: "rotate(15deg)" },
              }
            },
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #F5F0E8;
        color: #2D2D2D;
        font-family: 'DM Sans', sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
        font-size: 20px;
      }
      .mono-data {
        font-family: 'Space Mono', monospace;
      }
      .font-mono-data {
        font-family: 'Space Mono', monospace;
      }
      .squircle {
        border-radius: 0; /* Memphis uses sharp corners */
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #9B59B6; }
    </style>
  </head>
  <body class="overflow-x-hidden">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
